{% load static %}
<form id="product-form" hx-post="{{ request.path }}" hx-swap="outerHTML" class="space-y-4">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Product Name *</label>
        <input type="text" name="name" required
               value="{{ product.name|default:'' }}"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
               placeholder="Enter product name">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea name="description" rows="3"
                  class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                  placeholder="Product description">{{ product.description|default:'' }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Category *</label>
            <select name="category" required
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                <option value="">Select category</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Unit Price *</label>
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">$</span>
                <input type="number" name="unit_price" step="0.01" min="0" required
                       value="{{ product.unit_price|default:'0.00' }}"
                       class="w-full pl-7 pr-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                       placeholder="0.00">
            </div>
        </div>
    </div>

    {% if not product %}
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Initial Quantity</label>
            <input type="number" name="quantity" min="0" value="0"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                   placeholder="0">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Reorder Level</label>
            <input type="number" name="reorder_level" min="0" value="10"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                   placeholder="10">
        </div>
    </div>
    {% else %}
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Reorder Level</label>
        <input type="number" name="reorder_level" min="0" value="{{ product.reorder_level }}"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
               placeholder="10">
    </div>
    {% endif %}

    <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <button type="button" onclick="closeModal()"
                class="px-4 py-2 text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium transition-colors">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors">
            {{ product|yesno:'Update,Create' }}
        </button>
    </div>
</form>

<script>
    document.getElementById('product-form').addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.successful) {
            const data = JSON.parse(e.detail.response.clone().text());
            if (data.success) {
                closeModal();
                htmx.ajax('GET', window.location.pathname + window.location.search, {
                    target: '#main-content',
                    swapOob: true
                });
            }
        }
    });
</script>
