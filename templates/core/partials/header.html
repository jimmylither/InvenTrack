<header class="sticky top-0 z-30 bg-white border-b border-slate-200 px-4 lg:px-8 py-4">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg transition-colors">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

            <div class="relative">
                <input type="text"
                       id="global-search"
                       placeholder="Search products, categories..."
                       class="w-64 lg:w-80 pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                <svg class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
        </div>

        <div class="flex items-center gap-4">
            {% if low_stock_products %}
            <div class="relative">
                <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors relative" id="alert-btn">
                    <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    {% if low_stock_products|length > 0 %}
                    <span class="absolute -top-1 -right-1 w-5 h-5 bg-amber-500 text-white text-xs rounded-full flex items-center justify-center">{{ low_stock_products|length }}</span>
                    {% endif %}
                </button>
                <div id="alerts-dropdown" class="hidden absolute right-0 top-full mt-2 w-80 bg-white rounded-lg shadow-lg border border-slate-200 py-2">
                    <div class="px-4 py-2 border-b border-slate-100">
                        <h3 class="font-semibold text-slate-800">Low Stock Alerts</h3>
                    </div>
                    {% for product in low_stock_products %}
                    <a href="{% url 'core:products' %}?search={{ product.sku }}" class="block px-4 py-3 hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full {% if product.quantity == 0 %}bg-red-500{% else %}bg-amber-500{% endif %}"></div>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-slate-800">{{ product.name }}</p>
                                <p class="text-xs text-slate-500">{{ product.sku }} · {{ product.quantity }} units left</p>
                            </div>
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<script>
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');

    if (sidebarToggle) {
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });
    }

    const alertBtn = document.getElementById('alert-btn');
    const alertsDropdown = document.getElementById('alerts-dropdown');

    if (alertBtn && alertsDropdown) {
        alertBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            alertsDropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            alertsDropdown.classList.add('hidden');
        });
    }
</script>
