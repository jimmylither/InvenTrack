<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center opacity-0 transition-opacity duration-200">
    <div class="modal-backdrop absolute inset-0" data-close-modal></div>
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-hidden transform transition-transform duration-200">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
            <h3 id="modal-title" class="text-lg font-semibold text-slate-800 font-heading">Modal Title</h3>
            <button data-close-modal class="p-1 hover:bg-slate-100 rounded-lg transition-colors">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="modal-content" class="p-6 overflow-y-auto max-h-[calc(90vh-80px)]">
            <!-- Dynamic content here -->
        </div>
    </div>
</div>
