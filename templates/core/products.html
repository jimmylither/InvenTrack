{% extends 'core/base.html' %}
{% block title %}Products - InvenTrack Pro{% endblock %}

{% block content %}
<div id="main-content" class="space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 font-heading">Products</h2>
            <p class="text-slate-500">Manage your product inventory</p>
        </div>
        <button onclick="openModal('{% url 'core:product_create' %}', 'Add New Product')"
                class="px-4 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg font-medium flex items-center gap-2 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Product
        </button>
    </div>

    {% include 'core/partials/stats.html' %}

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div class="relative flex-1 max-w-md">
                <input type="text"
                       id="products-search"
                       name="search"
                       value="{{ search }}"
                       placeholder="Search products..."
                       hx-get="{% url 'core:products' %}"
                       hx-target="#products-table-body"
                       hx-trigger="input delay:300ms"
                       hx-select="#products-table-body"
                       hx-swap="outerHTML"
                       class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                <svg class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>

            <div class="flex items-center gap-3">
                <select name="category"
                        hx-get="{% url 'core:products' %}"
                        hx-target="#products-table-body"
                        hx-select="#products-table-body"
                        hx-swap="outerHTML"
                        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">All Categories</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if category_filter == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>

                <select name="stock"
                        hx-get="{% url 'core:products' %}"
                        hx-target="#products-table-body"
                        hx-select="#products-table-body"
                        hx-swap="outerHTML"
                        class="px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">All Stock</option>
                    <option value="in" {% if stock_filter == 'in' %}selected{% endif %}>In Stock</option>
                    <option value="low" {% if stock_filter == 'low' %}selected{% endif %}>Low Stock</option>
                    <option value="out" {% if stock_filter == 'out' %}selected{% endif %}>Out of Stock</option>
                </select>
            </div>
        </div>

        {% include 'core/partials/products_table.html' %}
    </div>
</div>
{% endblock %}
