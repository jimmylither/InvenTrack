<form id="category-form" hx-post="{{ request.path }}" hx-swap="outerHTML" class="space-y-4">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Category Name *</label>
        <input type="text" name="name" required
               value="{{ category.name|default:'' }}"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
               placeholder="Enter category name">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea name="description" rows="3"
                  class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                  placeholder="Category description">{{ category.description|default:'' }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Color</label>
            <div class="flex items-center gap-2">
                <input type="color" name="color" value="{{ category.color|default:'#6366F1' }}"
                       class="w-10 h-10 border border-slate-300 rounded-lg cursor-pointer">
                <input type="text" name="color" value="{{ category.color|default:'#6366F1' }}"
                       class="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                       placeholder="#6366F1">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Icon</label>
            <select name="icon"
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                <option value="box" {% if category.icon == 'box' %}selected{% endif %}>Box</option>
                <option value="tag" {% if category.icon == 'tag' %}selected{% endif %}>Tag</option>
                <option value="shopping" {% if category.icon == 'shopping' %}selected{% endif %}>Shopping</option>
                <option value="archive" {% if category.icon == 'archive' %}selected{% endif %}>Archive</option>
            </select>
        </div>
    </div>

    <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <button type="button" onclick="closeModal()"
                class="px-4 py-2 text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium transition-colors">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors">
            {{ category|yesno:'Update,Create' }}
        </button>
    </div>
</form>

<script>
    document.getElementById('category-form').addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.successful) {
            const data = JSON.parse(e.detail.response.clone().text());
            if (data.success) {
                closeModal();
                location.reload();
            }
        }
    });
</script>
