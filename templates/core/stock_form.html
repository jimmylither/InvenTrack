<form id="stock-form" hx-post="{{ request.path }}" hx-swap="outerHTML" class="space-y-4">
    {% csrf_token %}

    <div class="bg-slate-50 rounded-lg p-4">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm font-medium text-slate-800">{{ product.name }}</p>
                <p class="text-xs text-slate-500">{{ product.sku }}</p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-bold text-slate-800">{{ product.quantity }}</p>
                <p class="text-xs text-slate-500">current stock</p>
            </div>
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Transaction Type</label>
        <div class="grid grid-cols-3 gap-2">
            <label class="flex items-center justify-center px-4 py-3 border-2 border-emerald-500 bg-emerald-50 rounded-lg cursor-pointer">
                <input type="radio" name="transaction_type" value="IN" checked class="sr-only">
                <div class="text-center">
                    <svg class="w-6 h-6 mx-auto text-emerald-600 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span class="text-sm font-medium text-emerald-700">Stock In</span>
                </div>
            </label>
            <label class="flex items-center justify-center px-4 py-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                <input type="radio" name="transaction_type" value="OUT" class="sr-only">
                <div class="text-center">
                    <svg class="w-6 h-6 mx-auto text-red-600 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                    <span class="text-sm font-medium text-slate-600">Stock Out</span>
                </div>
            </label>
            <label class="flex items-center justify-center px-4 py-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-300">
                <input type="radio" name="transaction_type" value="ADJUST" class="sr-only">
                <div class="text-center">
                    <svg class="w-6 h-6 mx-auto text-slate-600 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
                    </svg>
                    <span class="text-sm font-medium text-slate-600">Adjust</span>
                </div>
            </label>
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Quantity *</label>
        <input type="number" name="quantity" min="1" value="1" required
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
               placeholder="Enter quantity">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
        <textarea name="notes" rows="2"
                  class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                  placeholder="Optional notes for this transaction"></textarea>
    </div>

    <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
        <button type="button" onclick="closeModal()"
                class="px-4 py-2 text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium transition-colors">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors">
            Confirm
        </button>
    </div>
</form>

<style>
    input[type="radio"]:checked + div {
        background-color: currentColor;
    }
    input[type="radio"][value="IN"]:checked + div { color: #ecfdf5; }
    input[type="radio"][value="OUT"]:checked + div { color: #fef2f2; }
    input[type="radio"][value="ADJUST"]:checked + div { color: #f8fafc; }
</style>

<script>
    document.querySelectorAll('input[name="transaction_type"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.querySelectorAll('input[name="transaction_type"]').forEach(r => {
                const parent = r.nextElementSibling;
                parent.classList.remove('border-emerald-500', 'bg-emerald-50');
                parent.classList.add('border-slate-200');
                if (r.value === 'IN') {
                    parent.classList.remove('border-emerald-500', 'bg-emerald-50');
                } else if (r.value === 'OUT') {
                    parent.classList.remove('border-red-500', 'bg-red-50');
                } else {
                    parent.classList.remove('border-slate-500', 'bg-slate-50');
                }
            });
            const parent = this.nextElementSibling;
            parent.classList.remove('border-slate-200');
            parent.classList.add('border-2');
            if (this.value === 'IN') {
                parent.classList.add('border-emerald-500', 'bg-emerald-50');
            } else if (this.value === 'OUT') {
                parent.classList.add('border-red-500', 'bg-red-50');
            } else {
                parent.classList.add('border-slate-500', 'bg-slate-50');
            }
        });
    });

    document.getElementById('stock-form').addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.successful) {
            const data = JSON.parse(e.detail.response.clone().text());
            if (data.success) {
                closeModal();
                htmx.ajax('GET', window.location.pathname + window.location.search, {
                    target: '#main-content',
                    swapOob: true
                });
            }
        }
    });
</script>
